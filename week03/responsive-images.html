<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Responsive Images Activity</title>
    <meta name="description" content="is to work with different images">
    <meta name="author" content="Matias Martinez">
</head>
<body>
    <main>
        <div class="hero">
            <picture>
                <source media="(min-width: 1000px)" srcset="images/hero-large.webp">

                <img src="images/hero-small.webp" alt="Antofagaste Chile temple" width="500px" height="250px">
            </picture>
        </div>
    </main>
    
</body>
</html>
